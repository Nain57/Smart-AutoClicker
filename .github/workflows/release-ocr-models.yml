name: Release OCR Models

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OCR models
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install -r scripts/ocr-models/requirements.txt

      - name: Build language pack models
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/ocr-models/build_models.py --output output --mode language_pack

      - name: Collect release artifacts
        run: |
          mkdir -p dist
          find output/rec -maxdepth 1 -name "*.zip" -exec cp {} dist/ \;

      - name: Replace release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: 'test-recognition-models'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
